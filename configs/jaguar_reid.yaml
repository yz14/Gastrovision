# ================================================================
# Jaguar Re-ID 训练配置
# ================================================================
#
# 用法:
#   python -m jaguar.train configs/jaguar_reid.yaml
#
# 服务器数据路径:
#   /data0/yzhen/data/jaguar_reid/train/  — 训练图片
#   /data0/yzhen/data/jaguar_reid/test/   — 测试图片
#   /data0/yzhen/data/jaguar_reid/train.csv
#   /data0/yzhen/data/jaguar_reid/test.csv
# ================================================================

# ---- 数据路径 ----
train_csv: "/data0/yzhen/data/jaguar_reid/train.csv"
train_image_dir: "/data0/yzhen/data/jaguar_reid/train"
test_csv: "/data0/yzhen/data/jaguar_reid/test.csv"
test_image_dir: "/data0/yzhen/data/jaguar_reid/test"
output_dir: "/data0/yzhen/projects/gastrovision_v3/output/jaguar_arcface"

# ---- 数据划分 ----
val_ratio: 0.15            # 验证集比例
seed: 42

# ---- 模型 ----
# 可选: resnet50, resnet101, convnext_tiny/small/base, efficientnet_v2_s/m/l, swin_t/s/b
backbone: "resnet50"
embedding_dim: 512         # 嵌入维度
pretrained: true           # ImageNet 预训练
pretrained_path: "/data0/data/resnet50.pth"        # 本地预训练权重路径 (为空则使用 torchvision 默认下载)
                           # 示例: "/data0/yzhen/pretrained/convnext_base_1k_224_ema.pth"
use_gem: true              # GeM Pooling (优于 AvgPool)
gem_p: 3.0                 # GeM 初始 p 值
dropout: 0.2               # embedding FC 前的 dropout (Re-ID 小数据集推荐 0.2~0.3)

# ---- 损失函数 ----
# 主损失类型:
#   Proxy-based (含可学习权重, 用 BNNeck 后特征):
#     arcface    — ArcFace (CVPR 2019, 推荐默认)
#     cosface    — CosFace (CVPR 2018)
#     sphereface — SphereFace (CVPR 2017)
#     proxy_nca  — Proxy NCA (NeurIPS 2017)
#     circle_cls — Circle Loss 分类版 (CVPR 2020)
#
#   Pair-based (无可学习权重, 用 BNNeck 前特征):
#     triplet     — Triplet Loss + Batch Hard Mining (CVPR 2015)
#     contrastive — Contrastive Loss (CVPR 2006)
#     circle      — Circle Loss pair 版 (CVPR 2020)
#     lifted      — Lifted Structure Loss (CVPR 2016)
#     npair       — N-pair Loss (NeurIPS 2016)
loss_type: "arcface"
# 每种损失有合理默认参数 (见 train.py LOSS_DEFAULTS)，切换 loss_type 无需改动参数。
# 如需覆盖，使用 loss-type-specific 键 (如 arcface_scale, triplet_margin):
# arcface_scale: 30.0      # ArcFace 缩放因子 s (默认 30.0)
# arcface_margin: 0.5      # ArcFace 角度间隔 m2 (默认 0.5 rad ≈ 28.6°)
# triplet_margin: 0.3      # Triplet 距离间隔 (默认 0.3)
# circle_scale: 256.0      # CircleLoss 缩放因子 γ (默认 256.0)
# circle_margin: 0.25      # CircleLoss 间隔 m (默认 0.25)

# 标签平滑 (proxy-based 损失的正则化，减少过拟合)
label_smoothing: 0.1       # 0.0=禁用, 0.1=推荐 (31类小数据集必须启用)

# 辅助损失 (可选, 与主损失组合, 始终作用于 BNNeck 前特征)
# 推荐: arcface + triplet 是 Bag of Tricks (CVPR 2019) 的标准组合
# triplet 直接优化 raw_feat 的度量空间，这是推理时实际使用的特征
aux_loss_type: "triplet"   # triplet / contrastive / circle / lifted / npair / none
aux_loss_weight: 1.0       # 辅助损失权重 (total_loss = primary + weight * aux)
# PK sampler 参数 (使用 pair-based 损失时自动启用)
pk_p: 8                    # 每 batch 的类别数
pk_k: 4                    # 每类别的实例数 (batch_size = p*k = 32)
# 辅助损失参数同样支持 loss-type-specific 键 (如 aux_triplet_margin: 0.3)

# ---- 训练 ----
epochs: 120
batch_size: 32
lr: 0.0003                 # 学习率 (head + 损失头)
backbone_lr_mult: 0.1      # backbone 学习率乘数 (backbone_lr = lr * mult)
weight_decay: 0.0001
optimizer: "adamw"         # adam / adamw / sgd
scheduler: "warmup_cosine" # step / cosine / plateau / warmup_cosine / none
warmup_epochs: 5
early_stopping: 0          # 早停 (0=禁用; 小数据集配合EMA建议禁用，避免过早终止)
save_metric: "mAP"         # 最佳模型选择指标: rank1 / mAP / auc (推荐 mAP, 与 Kaggle 分数相关性最高)

# ---- 图像与增强 ----
image_size: 384            # 输入图像尺寸 (Re-ID 通常用较大分辨率)
augment_level: "heavy"     # light / medium / heavy (Re-ID 推荐 heavy)
num_workers: 24

# ---- EMA ----
ema: true
ema_decay: 0.999            # EMA 衰减率 (>=0.9999 时自动计算; 小数据集推荐 0.999)

# ---- 推理 ----
use_flip_tta: true         # 推理时使用水平翻转 TTA

# ---- 运行模式 ----
test_only: false           # 只推理 (需配合 resume)
resume: ""                 # 从 checkpoint 恢复
