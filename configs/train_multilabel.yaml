# ============================================================
# Gastrovision 多标签分类训练配置
# ============================================================
# 使用方式:
#   python train_multilabel.py --config configs/train_multilabel.yaml
# ============================================================

# --- 数据 ---
data_dir: "D:/codes/data/hyper_kvasir/labeled-images"
output_dir: "D:/codes/work-projects/Gastrovision_results/multilabel_default"

# --- 模型 ---
model: "resnet50"
pretrained: true
weights_path: ""
freeze_backbone: false

# --- 训练 ---
epochs: 100
batch_size: 32
lr: 0.001
weight_decay: 0.0001
optimizer: "adamw"
scheduler: "warmup_cosine"
warmup_epochs: 5
early_stopping: 15
seed: 42

# --- 图像 ---
image_size: 224
num_workers: 4

# --- 多标签参数 ---
num_classes: 16
multilabel_threshold: 0.5
multilabel_loss: "focal_ohem"   # bce / focal / focal_ohem / asymmetric / asl / label_smoothing / poly / dice / softmax
multilabel_focal_gamma: 2.0
multilabel_ohem_ratio: 0.4
asl_gamma_neg: 4.0
asl_gamma_pos: 1.0
asl_clip: 0.05
label_smoothing_factor: 0.1
poly_epsilon: 1.0

# --- Triplet Loss (WhaleSSL 风格) ---
use_triplet: false
triplet_weight: 1.0
triplet_margin: 0.3
triplet_num_instances: 4

# --- 度量学习 ---
metric_loss: "none"
metric_loss_weight: 0.5
metric_loss_margin: 0.0
metric_loss_scale: 0.0
embedding_dim: 512

# --- 数据增强策略 ---
mixup: 0.0
cutmix: 0.0

# --- 其他 ---
test_only: false
resume: ""
